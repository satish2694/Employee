spring.application.name=Employee

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.root=INFO
logging.level.org.myapp.employee=DEBUG
logging.level.org.myapp.employee.FileRepository=DEBUG
logging.level.org.myapp.employee.FileUploadService=DEBUG
logging.level.software.amazon.awssdk=DEBUG

# AWS S3
aws.s3.bucket=blob-documents-uploads
aws.s3.region=ap-south-1
# Leave blank — credentials resolved via DefaultCredentialsProvider:
#   local: ~/.aws/credentials or AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars
#   EKS:   IRSA (injected service account token)
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretKey=${AWS_SECRET_ACCESS_KEY:}

# Multipart upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=600MB

# Async thread pool
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
